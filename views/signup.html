<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — AuthApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif; min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }
    .left {
      flex: 1; display: none; flex-direction: column;
      justify-content: center; align-items: center;
      color: white; padding: 40px;
    }
    @media(min-width: 768px) { .left { display: flex; } }
    .left h2 { font-size: 2rem; margin-bottom: 12px; }
    .left p { font-size: 1rem; opacity: 0.85; max-width: 320px; text-align: center; line-height: 1.6; }
    .right { flex: 1; display: flex; justify-content: center; align-items: center; padding: 24px; }
    .card {
      background: white; padding: 44px 36px; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo span { font-size: 2rem; }
    .logo h1 { font-size: 1.4rem; color: #333; margin-top: 6px; }
    .logo p { font-size: 0.85rem; color: #888; margin-top: 4px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 6px; }
    .input-wrap { position: relative; margin-bottom: 18px; }
    input {
      width: 100%; padding: 11px 40px 11px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 0.95rem; transition: border 0.2s; background: #fafafa;
    }
    input:focus { outline: none; border-color: #11998e; background: white; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 1rem; color: #aaa; user-select: none;
    }
    .toggle-pw:hover { color: #11998e; }
    .strength-bar { height: 4px; border-radius: 4px; margin-top: -12px; margin-bottom: 14px; background: #eee; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 4px; transition: width 0.3s, background 0.3s; }
    .strength-label { font-size: 0.75rem; color: #888; margin-top: 4px; margin-bottom: 14px; }
    .error {
      background: #fff0f0; color: #c0392b; border: 1px solid #fcc;
      padding: 10px 14px; border-radius: 8px; font-size: 0.85rem;
      margin-bottom: 18px; text-align: center;
    }
    .btn {
      width: 100%; padding: 12px; font-size: 1rem; font-weight: 600;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white; border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .footer-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: #777; }
    .footer-link a { color: #11998e; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="left">
    <h2>Join AuthApp</h2>
    <p>Create your account in seconds and get access to your personal dashboard.</p>
  </div>
  <div class="right">
    <div class="card">
      <div class="logo">
        <span>✨</span>
        <h1>Create Account</h1>
        <p>Fill in the details below to get started</p>
      </div>
      <div id="error-msg" class="error" style="display:none"></div>
      <form method="POST" action="/signup">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="At least 3 characters" required autocomplete="username" />
        </div>
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" oninput="checkStrength(this.value)" />
          <span class="toggle-pw" onclick="togglePw('password', this)">👁</span>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
        <button type="submit" class="btn">Create Account</button>
      </form>
      <p class="footer-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    const el = document.getElementById('error-msg');
    if (err === 'taken') { el.textContent = 'Username already taken. Try another.'; el.style.display = 'block'; }
    else if (err === 'invalid') { el.textContent = 'Username must be 3+ chars and password 6+ chars.'; el.style.display = 'block'; }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    function checkStrength(val) {
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '0%', color: '#eee', text: '' },
        { w: '25%', color: '#e74c3c', text: 'Weak' },
        { w: '50%', color: '#e67e22', text: 'Fair' },
        { w: '75%', color: '#f1c40f', text: 'Good' },
        { w: '90%', color: '#2ecc71', text: 'Strong' },
        { w: '100%', color: '#27ae60', text: 'Very Strong' },
      ];
      const l = levels[Math.min(score, 5)];
      fill.style.width = l.w;
      fill.style.background = l.color;
      label.textContent = l.text;
      label.style.color = l.color;
    }
  </script>
</body>
</html>
