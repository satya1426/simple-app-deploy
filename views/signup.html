<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif; background: #f0f2f5;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .card {
      background: white; padding: 40px 32px; border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 380px;
    }
    h1 { font-size: 1.5rem; color: #333; margin-bottom: 24px; text-align: center; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 1rem; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #4a90e2; }
    button {
      width: 100%; padding: 11px; background: #27ae60; color: white;
      border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #219150; }
    .error {
      background: #fdecea; color: #c0392b; padding: 10px 12px;
      border-radius: 6px; font-size: 0.9rem; margin-bottom: 16px; text-align: center;
    }
    .hint { font-size: 0.8rem; color: #888; margin-top: -12px; margin-bottom: 16px; }
    .login-link { text-align: center; margin-top: 16px; font-size: 0.9rem; color: #555; }
    .login-link a { color: #4a90e2; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <div id="error-msg" class="error" style="display:none"></div>
    <form method="POST" action="/signup">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="At least 3 characters" required autocomplete="username" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" />
      <p class="hint">Min 6 characters</p>
      <button type="submit">Sign Up</button>
    </form>
    <p class="login-link">Already have an account? <a href="/login">Login</a></p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    const el = document.getElementById('error-msg');
    if (err === 'taken') {
      el.textContent = 'Username already taken. Try another.';
      el.style.display = 'block';
    } else if (err === 'invalid') {
      el.textContent = 'Username must be 3+ chars and password 6+ chars.';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
