<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AuthApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .left {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      color: white; padding: 40px; display: none;
    }
    @media(min-width: 768px) { .left { display: flex; } }
    .left h2 { font-size: 2rem; margin-bottom: 12px; }
    .left p { font-size: 1rem; opacity: 0.85; max-width: 320px; text-align: center; line-height: 1.6; }
    .right {
      flex: 1; display: flex; justify-content: center; align-items: center; padding: 24px;
    }
    .card {
      background: white; padding: 44px 36px; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo span { font-size: 2rem; }
    .logo h1 { font-size: 1.4rem; color: #333; margin-top: 6px; }
    .logo p { font-size: 0.85rem; color: #888; margin-top: 4px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 6px; }
    .input-wrap { position: relative; margin-bottom: 18px; }
    input {
      width: 100%; padding: 11px 40px 11px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 0.95rem; transition: border 0.2s;
      background: #fafafa;
    }
    input:focus { outline: none; border-color: #667eea; background: white; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 1rem; color: #aaa; user-select: none;
    }
    .toggle-pw:hover { color: #667eea; }
    .error {
      background: #fff0f0; color: #c0392b; border: 1px solid #fcc;
      padding: 10px 14px; border-radius: 8px; font-size: 0.85rem;
      margin-bottom: 18px; text-align: center;
    }
    .btn {
      width: 100%; padding: 12px; font-size: 1rem; font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .footer-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: #777; }
    .footer-link a { color: #667eea; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="left">
    <h2>Welcome Back</h2>
    <p>Sign in to access your personal dashboard and manage your account securely.</p>
  </div>
  <div class="right">
    <div class="card">
      <div class="logo">
        <span>🔐</span>
        <h1>AuthApp</h1>
        <p>Sign in to your account</p>
      </div>
      <div id="error-msg" class="error" style="display:none">Invalid username or password</div>
      <form method="POST" action="/login">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
        </div>
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
          <span class="toggle-pw" onclick="togglePw('password', this)">👁</span>
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>
      <p class="footer-link">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }
    function togglePw(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    }
  </script>
</body>
</html>
